<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Pulse | Premium Daily News & Aggregator</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-icon"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
                    <span>Daily Pulse</span>
                </div>
            </div>
            
            <!-- Weather Widget -->
            <div class="weather-widget" id="weatherWidget">
                <div class="weather-loading">
                    <div class="spinner"></div>
                    <span>Loading weather...</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section-title">Feeds</div>
                <button class="nav-item active" data-tab="all">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                    <span>All Feeds</span>
                </button>
                <button class="nav-item" data-tab="bookmarks">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
                    <span>Saved Articles</span>
                    <span class="badge" id="bookmarkCount">0</span>
                </button>
                
                <div class="nav-section-header">
                    <span class="nav-section-title">Custom Feeds</span>
                    <button class="add-feed-btn" id="openAddFeedModal" title="Add Custom RSS Feed">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    </button>
                </div>
                <div class="custom-feeds-list" id="customFeedsList">
                    <!-- Custom feeds will be loaded here -->
                    <div class="no-feeds-msg">No custom feeds added yet.</div>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button class="theme-toggle" id="themeToggleBtn" aria-label="Toggle Theme">
                    <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                    <span id="themeToggleText">Light Mode</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Header section -->
            <header class="app-header">
                <div class="greeting-section">
                    <h1 id="greeting">Good Morning</h1>
                    <p class="current-date" id="currentDate">Monday, July 13, 2026</p>
                </div>
                <div class="search-section">
                    <div class="search-bar">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" id="searchInput" placeholder="Search news stories...">
                        <button class="clear-search-btn" id="clearSearchBtn" aria-label="Clear Search">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Inspirational Quote Section -->
            <div class="quote-card" id="quoteCard">
                <div class="quote-content">
                    <p class="quote-text" id="quoteText">"Loading your daily dose of inspiration..."</p>
                    <p class="quote-author" id="quoteAuthor">- Daily Pulse</p>
                </div>
                <button class="close-quote-btn" id="closeQuoteBtn" title="Hide Quote">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <!-- Categories and Filter Section -->
            <section class="filters-section">
                <div class="categories-tabs" id="categoriesTabs">
                    <button class="category-chip active" data-category="all">General</button>
                    <button class="category-chip" data-category="technology">Technology</button>
                    <button class="category-chip" data-category="science">Science</button>
                    <button class="category-chip" data-category="sports">Sports</button>
                </div>
                <div class="feed-status" id="feedStatus">
                    <span class="refresh-indicator"></span>
                    <button class="refresh-btn" id="refreshBtn">
                        <svg class="refresh-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                        <span>Sync</span>
                    </button>
                </div>
            </section>

            <!-- News Grid -->
            <div class="news-container">
                <div class="news-grid" id="newsGrid">
                    <!-- Skeleton screens will be generated here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Reader Drawer/Overlay -->
    <div class="reader-overlay" id="readerOverlay">
        <div class="reader-drawer">
            <button class="close-drawer-btn" id="closeDrawerBtn" aria-label="Close Reader">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <div class="reader-content" id="readerContent">
                <!-- Content injected dynamically -->
            </div>
        </div>
    </div>

    <!-- Add Custom Feed Modal -->
    <div class="modal-overlay" id="addFeedModal">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Add Custom RSS Feed</h2>
                <button class="close-modal-btn" id="closeFeedModalBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <form id="addFeedForm" class="modal-form">
                <div class="form-group">
                    <label for="feedName">Feed Name</label>
                    <input type="text" id="feedName" placeholder="e.g. Wired Science, Hacker News" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="feedUrl">RSS Feed URL</label>
                    <input type="url" id="feedUrl" placeholder="https://example.com/feed.xml" required autocomplete="off">
                    <span class="help-text">Must be a valid XML RSS feed URL. We will test it before adding.</span>
                </div>
                <div class="form-group">
                    <label for="feedCategory">Category Group</label>
                    <select id="feedCategory">
                        <option value="general">General</option>
                        <option value="technology">Technology</option>
                        <option value="science">Science</option>
                        <option value="sports">Sports</option>
                    </select>
                </div>
                <div class="modal-error" id="modalError"></div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelFeedBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveFeedBtn">
                        <span class="btn-text">Add Feed</span>
                        <div class="btn-spinner"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Application Script -->
    <script src="app.js"></script>
</body>
</html>
